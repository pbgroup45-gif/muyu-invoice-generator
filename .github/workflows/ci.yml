name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  TRIVY_DISABLE_VEX_NOTICE: true

jobs:
  lint-and-test:
    name: 1. Lint, test, and scan source
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24.16.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          output: trivy-fs.txt
          severity: HIGH,CRITICAL
          exit-code: '0'

      - name: Upload Trivy filesystem scan
        if: always()
        uses: actions/upload-artifact@v6.0.0
        with:
          name: trivy-fs
          path: trivy-fs.txt
          if-no-files-found: ignore

  build-image:
    name: 2. Build and scan image
    runs-on: ubuntu-24.04
    needs: lint-and-test
    outputs:
      image_ref: ${{ steps.image.outputs.ref }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Generate image reference
        id: image
        run: echo "ref=ghcr.io/${GITHUB_REPOSITORY,,}:v$(date -u +%Y.%m.%d)-r${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Build Docker image
        id: docker-build
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          tags: ${{ steps.image.outputs.ref }}
          load: true

      - name: Run Trivy image scan
        if: steps.docker-build.outcome == 'success'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ steps.image.outputs.ref }}
          scanners: vuln
          format: table
          output: trivy-image.txt
          severity: HIGH,CRITICAL
          hide-progress: true
          exit-code: '1'

      - name: Upload Trivy image scan
        if: always()
        uses: actions/upload-artifact@v6.0.0
        with:
          name: trivy-image
          path: trivy-image.txt
          if-no-files-found: ignore

      - name: Export Docker image
        if: github.event_name == 'push'
        run: |
          docker save --output docker-image.tar "${{ steps.image.outputs.ref }}"
          echo "${{ steps.image.outputs.ref }}" > image-ref.txt

      - name: Upload Docker image
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v6.0.0
        with:
          name: docker-image
          path: |
            docker-image.tar
            image-ref.txt
          retention-days: 1
          if-no-files-found: error

      - name: Comment Docker build result
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v3.0.4
        with:
          header: docker-image-build
          message: |
            ## ${{ steps.docker-build.outcome == 'success' && '✅' || '🔴' }} Docker image build

            Result: `${{ steps.docker-build.outcome }}`
            Image tag: `${{ steps.image.outputs.ref }}`
            Details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  security-report:
    name: 3. Security report
    runs-on: ubuntu-24.04
    needs: build-image
    if: always()

    steps:
      - name: Download Trivy filesystem scan
        uses: actions/download-artifact@v6.0.0
        with:
          name: trivy-fs
          path: trivy-fs
        continue-on-error: true

      - name: Download Trivy image scan
        uses: actions/download-artifact@v6.0.0
        with:
          name: trivy-image
          path: trivy-image
        continue-on-error: true

      - name: Prepare Trivy comments
        run: |
          {
            icon="🔴"
            if [ ! -f trivy-fs/trivy-fs.txt ]; then
              body="Filesystem scan did not produce a report."
            elif grep -Eq ' (HIGH|CRITICAL) ' trivy-fs/trivy-fs.txt; then
              body="$(printf '```\n%s\n```' "$(cat trivy-fs/trivy-fs.txt)")"
            else
              icon="✅"
              body="No HIGH or CRITICAL vulnerabilities found."
            fi
            echo "## $icon Trivy filesystem scan"
            echo
            echo "Details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo
            echo "$body"
          } > trivy-fs-comment.txt

          {
            icon="🔴"
            if [ ! -f trivy-image/trivy-image.txt ]; then
              body="Image scan did not produce a report."
            elif grep -Eq ' (HIGH|CRITICAL) ' trivy-image/trivy-image.txt; then
              body="$(printf '```\n%s\n```' "$(cat trivy-image/trivy-image.txt)")"
            else
              icon="✅"
              body="No HIGH or CRITICAL vulnerabilities found."
            fi
            echo "## $icon Trivy image scan"
            echo
            echo "Image tag: \`${{ needs.build-image.outputs.image_ref }}\`"
            echo "Details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo
            echo "$body"
          } > trivy-image-comment.txt

      - name: Comment Trivy filesystem scan
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v3.0.4
        with:
          header: trivy-fs-scan
          path: trivy-fs-comment.txt

      - name: Comment Trivy image scan
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v3.0.4
        with:
          header: trivy-image-scan
          path: trivy-image-comment.txt

      - name: Enforce security gate
        run: |
          test "${{ needs.build-image.result }}" = "success"
          test -f trivy-fs/trivy-fs.txt
          test -f trivy-image/trivy-image.txt
          ! { grep -Eq ' (HIGH|CRITICAL) ' trivy-fs/trivy-fs.txt || grep -Eq ' (HIGH|CRITICAL) ' trivy-image/trivy-image.txt; }

  publish-image:
    name: 4. Publish image (push only)
    runs-on: ubuntu-24.04
    needs: security-report
    permissions:
      packages: write

    steps:
      - name: Download Docker image
        if: github.event_name == 'push'
        uses: actions/download-artifact@v6.0.0
        with:
          name: docker-image

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Load and push Docker image
        if: github.event_name == 'push'
        run: |
          docker load --input docker-image.tar
          docker push "$(cat image-ref.txt)"

  ci-complete:
    name: 5. CI complete
    runs-on: ubuntu-24.04
    needs: publish-image
    if: always()
    steps:
      - name: Check result
        run: test "${{ needs.publish-image.result }}" = "success"
